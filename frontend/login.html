<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zorvyn Finance — Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 2rem;
            width: 100%;
            max-width: 360px;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 0.3rem;
            color: #111;
        }

        .sub {
            font-size: 13px;
            color: #888;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            padding: 9px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 1rem;
            outline: none;
        }

        input:focus {
            border-color: #555;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover {
            background: #444;
        }

        .btn:disabled {
            background: #888;
            cursor: not-allowed;
        }

        .error {
            background: #fff5f5;
            border: 1px solid #f5c0c0;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 13px;
            color: #c00;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Zorvyn Finance</h2>
        <p class="sub">Sign in to continue</p>
        <div class="error" id="err"></div>
        <label>Email</label>
        <input type="email" id="email" placeholder="you@zorvyn.com" />
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
        <button class="btn" id="btn" onclick="doLogin()">Sign in</button>
    </div>

    <script>
        const API = 'http://localhost:8080';

        async function doLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const err = document.getElementById('err');
            const btn = document.getElementById('btn');
            err.style.display = 'none';

            if (!email || !password) {
                err.textContent = 'Please enter email and password.';
                err.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!res.ok) throw new Error('Invalid credentials');

                const token = await res.text();
                const payload = JSON.parse(atob(token.split('.')[1]));

                localStorage.setItem('token', token);
                localStorage.setItem('email', email);
                localStorage.setItem('role', payload.role || 'VIEWER');

                window.location.href = 'dashboard.html';
            } catch (e) {
                err.textContent = e.message || 'Login failed.';
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign in';
            }
        }

        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>

</html>
